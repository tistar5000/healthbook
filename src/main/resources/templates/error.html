<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Error — HealthBook</title>
    <style>
        body  { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1    { color: #01696f; }
        .nav a { margin-right: 16px; color: #01696f; text-decoration: none; font-weight: bold; }
        .nav a:hover { text-decoration: underline; }
        .error-card { background: #fdecea; border: 1px solid #f5c6cb; border-radius: 8px; padding: 24px; margin-top: 24px; }
        .error-card h2 { color: #721c24; margin-top: 0; }
        .btn  { display: inline-block; margin-top: 16px; background: #01696f; color: white;
            padding: 10px 20px; border-radius: 6px; text-decoration: none; }
        .btn:hover { background: #0c4e54; }
    </style>
</head>
<body>
<h1>HealthBook</h1>
<nav class="nav">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/slots}">Book Appointment</a>
    <a th:href="@{/appointments}">My Appointments</a>
    <a th:href="@{/health}">System Health</a>
</nav>
<hr/>

<div class="error-card">
    <h2>Something went wrong</h2>
    <p th:text="${message != null ? message : 'An unexpected error occurred.'}"></p>
    <p>Status: <strong th:text="${status}"></strong></p>
</div>

<a class="btn" th:href="@{/}">← Back to Home</a>
</body>
</html>
