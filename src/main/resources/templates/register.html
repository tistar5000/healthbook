<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register — HealthBook</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f5f7fa;
            color: #222;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #fff;
            border-bottom: 2px solid #01696f;
            padding: 0 40px;
            display: flex;
            align-items: center;
            height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        header .brand    { font-size: 1.6rem; font-weight: 700; color: #01696f; text-decoration: none; }
        header .subtitle { font-size: 0.85rem; color: #666; margin-left: 12px; }
        .page-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: #fff;
            border: 1px solid #dde3e8;
            border-radius: 12px;
            padding: 36px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .auth-card h2  { color: #01696f; margin-bottom: 6px; font-size: 1.5rem; }
        .auth-card p   { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
        .error-box {
            background: #fdecea;
            border: 1px solid #f5c6cb;
            border-radius: 6px;
            padding: 10px 14px;
            color: #721c24;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #333;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            margin-bottom: 16px;
            transition: border-color 0.15s;
        }
        input:focus { outline: none; border-color: #01696f; box-shadow: 0 0 0 2px #e0f0f0; }
        .btn {
            display: block;
            width: 100%;
            padding: 11px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-primary       { background: #01696f; color: #fff; }
        .btn-primary:hover { background: #0c4e54; }
        .divider { text-align: center; margin: 18px 0; color: #aaa; font-size: 0.85rem; }
        .link-muted {
            display: block;
            text-align: center;
            color: #01696f;
            font-size: 0.9rem;
            text-decoration: none;
            margin-top: 6px;
        }
        .link-muted:hover { text-decoration: underline; }
        .hint { font-size: 0.8rem; color: #888; margin-top: -12px; margin-bottom: 16px; }
    </style>
</head>
<body>

<header>
    <a class="brand" th:href="@{/}">HealthBook</a>
    <span class="subtitle" style="margin-left:12px;">Medical Office Online Scheduling System</span>
</header>

<div class="page-center">
    <div class="auth-card">
        <h2>Create an account</h2>
        <p>Register to start booking appointments.</p>

        <div class="error-box" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/register}" method="post">
            <label for="fullName">Full name</label>
            <input type="text" id="fullName" name="fullName"
                   placeholder="Jane Smith" required autofocus/>

            <label for="email">Email address</label>
            <input type="email" id="email" name="email"
                   placeholder="you@example.com" required/>

            <label for="password">Password</label>
            <input type="password" id="password" name="password"
                   placeholder="At least 6 characters" required/>
            <p class="hint">Must be at least 6 characters.</p>

            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" name="confirmPassword"
                   placeholder="Re-enter your password" required/>

            <button class="btn btn-primary" type="submit">Create Account</button>
        </form>

        <div class="divider">— or —</div>
        <a class="link-muted" th:href="@{/login}">Already have an account? Log in</a>
        <a class="link-muted" th:href="@{/}">← Back to home</a>
    </div>
</div>

</body>
</html>
