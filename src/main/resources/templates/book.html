<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Book Appointment — HealthBook</title>
    <style>
        body   { font-family: Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #222; }
        h1     { color: #01696f; }
        .nav a { margin-right: 16px; color: #01696f; text-decoration: none; font-weight: bold; }
        .nav a:hover { text-decoration: underline; }
        .card  { border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin-top: 24px; max-width: 420px; }
        label  { display: block; margin-bottom: 6px; font-weight: bold; }
        input  { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px;
            font-size: 15px; box-sizing: border-box; margin-bottom: 16px; }
        input:focus { outline: 2px solid #01696f; border-color: #01696f; }
        .btn   { background: #01696f; color: white; padding: 10px 20px; border: none;
            border-radius: 6px; font-size: 15px; cursor: pointer; }
        .btn:hover { background: #0c4e54; }
        .back  { color: #01696f; text-decoration: none; font-size: 14px; margin-top: 12px; display: inline-block; }
    </style>
</head>
<body>
<h1>HealthBook</h1>
<nav class="nav">
    <a th:href="@{/}">Home</a>
    <a th:href="@{/slots}">Book Appointment</a>
    <a th:href="@{/appointments}">My Appointments</a>
    <a th:href="@{/health}">System Health</a>
</nav>
<hr/>

<h2>Confirm Your Booking</h2>

<div class="card">
    <form th:action="@{/book}" method="post">
        <input type="hidden" name="slotId" th:value="${slotId}"/>

        <label for="patientName">Your Full Name</label>
        <input type="text" id="patientName" name="patientName"
               placeholder="e.g. Jane Smith" required autofocus/>

        <button class="btn" type="submit">Confirm Booking</button>
    </form>
    <a class="back" th:href="@{/slots}">← Back to available slots</a>
</div>
</body>
</html>
