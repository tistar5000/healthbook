<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Confirm Booking — HealthBook</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; color: #222; min-height: 100vh; }

        header {
            background: #fff; border-bottom: 2px solid #01696f;
            padding: 0 40px; display: flex; align-items: center;
            justify-content: space-between; height: 64px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .brand    { font-size: 1.5rem; font-weight: 700; color: #01696f; }
        .subtitle { font-size: 0.82rem; color: #666; margin-left: 10px; }
        .header-right { display: flex; gap: 10px; align-items: center; }
        .btn {
            display: inline-block; padding: 8px 18px; border-radius: 6px;
            font-size: 0.88rem; font-weight: 600; text-decoration: none;
            cursor: pointer; border: none; transition: background 0.15s;
        }
        .btn-primary       { background: #01696f; color: #fff; }
        .btn-primary:hover { background: #0c4e54; }
        .btn-outline       { background: #fff; color: #01696f; border: 2px solid #01696f; }
        .btn-outline:hover { background: #e8f5f5; }
        .btn-danger        { background: #c0392b; color: #fff; }
        .btn-danger:hover  { background: #a93226; }
        .btn-sm { padding: 6px 14px; font-size: 0.82rem; }
        .btn-lg { padding: 12px 32px; font-size: 1rem; }
        .btn-block { display: block; width: 100%; text-align: center; }

        .page-center {
            display: flex; justify-content: center;
            padding: 48px 20px;
        }
        .review-card {
            background: #fff; border: 1px solid #dde3e8; border-radius: 12px;
            padding: 36px 40px; width: 100%; max-width: 480px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .review-card h2 {
            color: #01696f; font-size: 1.3rem; margin-bottom: 6px;
        }
        .review-card .subtitle-text {
            color: #666; font-size: 0.9rem; margin-bottom: 28px;
        }

        .detail-row {
            display: flex; justify-content: space-between;
            align-items: center; padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .detail-row:last-of-type { border-bottom: none; }
        .detail-label {
            font-size: 0.82rem; color: #888;
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .detail-value { font-size: 0.95rem; font-weight: 600; color: #222; }

        .divider { margin: 24px 0; border: none; border-top: 2px solid #e0f0f0; }

        .name-field { margin-bottom: 20px; }
        .name-field label {
            display: block; font-weight: 600; font-size: 0.9rem;
            margin-bottom: 6px; color: #333;
        }
        .name-field input {
            width: 100%; padding: 9px 12px; border: 1px solid #ccc;
            border-radius: 6px; font-size: 0.95rem;
        }
        .name-field input:focus { outline: none; border-color: #01696f; box-shadow: 0 0 0 2px #e0f0f0; }

        .action-row {
            display: flex; gap: 12px; margin-top: 24px;
        }
        .action-row .btn { flex: 1; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:baseline; gap:8px;">
        <span class="brand">HealthBook</span>
        <span class="subtitle">Medical Office Online Scheduling System</span>
    </div>
    <div class="header-right">
        <a class="btn btn-outline btn-sm" th:href="@{/slots}">← Back to Slots</a>
        <a class="btn btn-danger  btn-sm" th:href="@{/logout}">Log Out</a>
    </div>
</header>

<div class="page-center">
    <div class="review-card">
        <h2>Review Your Booking</h2>
        <p class="subtitle-text">Please confirm the details below before booking.</p>

        <!-- Appointment details summary -->
        <div class="detail-row">
            <span class="detail-label">Provider</span>
            <span class="detail-value" th:text="${slot.providerName}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Date</span>
            <span class="detail-value"
                  th:text="${#temporals.format(slot.startDateTime, 'EEEE, MMMM dd yyyy')}">
            </span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Time</span>
            <span class="detail-value"
                  th:text="${#temporals.format(slot.startDateTime, 'hh:mm a') +
                             ' – ' +
                             #temporals.format(slot.endDateTime, 'hh:mm a')}">
            </span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Office Location</span>
            <span class="detail-value">1 Washington Sq</span>
        </div>

        <hr class="divider"/>

        <!-- Confirm form -->
        <form th:action="@{/book/confirm}" method="post">
            <input type="hidden" name="slotId" th:value="${slot.id}"/>

            <div class="name-field">
                <label for="patientName">Confirm your name</label>
                <input type="text" id="patientName" name="patientName"
                       th:value="${userName}" required/>
            </div>

            <div class="action-row">
                <a class="btn btn-outline" th:href="@{/slots}">Cancel</a>
                <button class="btn btn-primary" type="submit">Confirm My Booking</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
